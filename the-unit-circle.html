<html>
  <head><title>Calculate Trig Functions - Mr. Pellegrino</title>
    <script language="JavaScript">
      // Function to calculate the Greatest Common Divisor (GCD)
      function gcd(a, b)
      {
	  return b ? gcd(b, a % b) : a;
      }

      function deg2rad(_decimal)
      {
	  while( _decimal > 360 )
	  {
	      _decimal -= 360;
	  }

	  r = "";
	  s = "";
	  if( _decimal < 0 )
	  {
	      s = "-";
	  }
	  _decimal = Math.abs(_decimal);
	  G = gcd(_decimal, 180);
	  t = _decimal / G;
	  b = 180 / G;

	  if( t == 1 )
	  {
	      if( b == 1 )
	      {
		  r = s + "π";
	      }
	      else
	      {
		  r = s + "π/" + b;
	      }
	  }
	  else
	  {
	      if( b == 1 )
	      {
		  r = s + t + "π";
	      }
	      else
	      {
		  r = s + t + "π/" + b;
	      }
	  }
	  
	  if( t == 0 )
	  {
	      r = "0";
	  }
	  return r;
      }

      function rad2deg(_decimal)
      {
	  return( eval(_decimal*180) + "°");
      }
      
      function rou(_x)
      {
	  return Math.round(_x * 10000) / 10000;
      }

      function nice(_v)
      {
	  s = "";
	  if( _v < 0 )
	  {
	      s = "-";
	  }
	  _v = rou(Math.abs(_v));
	  if( _v == 0 )
	  {
	      s = "";
	  }
	  ret = _v;
	  if( _v > 100000 )
	  {
	      ret = "Undefined";
	      s="";
	  }
	  if( _v == rou(Math.sqrt(2)/2) )
	  {
	      ret = "&Sqrt;2/2";
	  }
	  if( _v == rou(Math.sqrt(3)/3) )
	  {
	      ret = "&Sqrt;3/3";
	  }
	  if( _v == rou(Math.sqrt(3)/2) )
	  {
	      ret = "&Sqrt;3/2";
	  }
	  if( _v == rou(Math.sqrt(2)) )
	  {
	      ret = "&Sqrt;2";
	  }
	  if( _v == rou(Math.sqrt(3)) )
	  {
	      ret = "&Sqrt;3";
	  }
	  if( _v == 0.5 )
	  {
	      ret = "1/2";
	  }
	  if( _v == rou(2*Math.sqrt(3)/3) )
	  {
	      ret = "2&Sqrt;3/3";
	  }
	  return s+ret;
      }

      function calculateA()
      {
	  p = Math.PI;
	  D = eval(document.getElementById('deg').value);
	  document.getElementById('CONVA').innerHTML=deg2rad(D);
	  document.getElementById('COORDA').innerHTML="(" + nice(Math.cos(D*Math.PI/180)) + "," + nice(Math.sin(D*Math.PI/180)) + ")";	  
	  document.getElementById('COSA').innerHTML="cos(" + D + "&deg;)= " + nice(Math.cos(D*Math.PI/180));
	  document.getElementById('SINA').innerHTML="sin(" + D + "&deg;)= " + nice(Math.sin(D*Math.PI/180));
	  document.getElementById('TANA').innerHTML="tan(" + D + "&deg;)= " + nice(Math.tan(D*Math.PI/180));
	  document.getElementById('SECA').innerHTML="sec(" + D + "&deg;)= " + nice(1/Math.cos(D*Math.PI/180));
	  document.getElementById('CSCA').innerHTML="csc(" + D + "&deg;)= " + nice(1/Math.sin(D*Math.PI/180));
	  document.getElementById('COTA').innerHTML="cot(" + D + "&deg;)= " + nice(1/Math.tan(D*Math.PI/180));
	  linetoA( 51 + 50*Math.cos(D*Math.PI/180), 51-50*Math.sin(D*Math.PI/180) );
	  
      }
      function piify(_v)
      {
	  //_v = nice(_v);
	  //_v = _v.replaceAll("1/", "/" );
	  if( _v[0] == '1' && _v[1] == '/' )
	  {
	      ret = _v.replaceAll("1/", "&pi;/" );	      
	  }
	  else
	  {
	      ret = _v.replaceAll("/", "&pi;/" );
	  }
	  return(ret);
      }


      function linetoA(X, Y)
      {
	  
	  mytext = "<svg width='102px' height='102px' id='svga'><circle r='50' cx='51' cy='51' stroke='red' fill='none'/><line x1='1' y1='51' x2='101' y2='51' stroke='black' stroke-width='1'/><line x1='51' y1='100' x2='51' y2='0' stroke='black' stroke-width='1'/>";
	  document.getElementById('SVGA').innerHTML = mytext + "<line x1='51' y1='51' x2='" + X + "' y2='" + Y + "' stroke='blue' stroke-width='1'/><line x1='" + X + "' y1='51' x2='" + X + "' y2='" + Y + "' stroke='blue' stroke-width='1'/></svg>";  
      }
      
      function linetoB(X, Y)
      {
	  
	  mytext = "<svg width='102px' height='102px' id='svga'><circle r='50' cx='51' cy='51' stroke='red' fill='none'/><line x1='1' y1='51' x2='101' y2='51' stroke='black' stroke-width='1'/><line x1='51' y1='100' x2='51' y2='0' stroke='black' stroke-width='1'/>";
	  document.getElementById('SVGB').innerHTML = mytext + "<line x1='51' y1='51' x2='" + X + "' y2='" + Y + "' stroke='blue' stroke-width='1'/><line x1='" + X + "' y1='51' x2='" + X + "' y2='" + Y + "' stroke='blue' stroke-width='1'/></svg>";  
      }

      function calculateB()
      {
	  p = Math.PI;
	  R = eval(document.getElementById('rad').value);
	  document.getElementById('CONVB').innerHTML=rad2deg(R);
	  //alert(R);

	  //document.getElementById('CONVB').innerHTML=deg2rad(D);
	  document.getElementById('COORDB').innerHTML="(" + nice(Math.cos(R*Math.PI)) + "," + nice(Math.sin(R*Math.PI)) + ")";	  
	  document.getElementById('COSB').innerHTML="cos(" + piify(document.getElementById('rad').value) + ")= " + nice(Math.cos(R*Math.PI));
	  document.getElementById('SINB').innerHTML="sin(" + piify(document.getElementById('rad').value) + ")= " + nice(Math.sin(R*Math.PI));
	  document.getElementById('TANB').innerHTML="tan(" + piify(document.getElementById('rad').value) + ")= " + nice(Math.tan(R*Math.PI));
	  document.getElementById('SECB').innerHTML="sec(" + piify(document.getElementById('rad').value) + ")= " + nice(1/Math.cos(R*Math.PI));
	  document.getElementById('CSCB').innerHTML="csc(" + piify(document.getElementById('rad').value) + ")= " + nice(1/Math.sin(R*Math.PI));
	  document.getElementById('COTB').innerHTML="cot(" + piify(document.getElementById('rad').value) + ")= " + nice(1/Math.tan(R*Math.PI));
	  linetoB( 51 + 50*Math.cos(R*Math.PI), 51-50*Math.sin(R*Math.PI) );
      }
    </script>
